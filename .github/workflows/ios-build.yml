name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install JS dependencies
        run: npm install

      - name: Create .env.local from secrets
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "POSTGRES_URL=${POSTGRES_URL}" >> .env.local
          echo "SUPABASE_URL=${SUPABASE_URL}" >> .env.local
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env.local
          echo "SUPABASE_REDIRECT_URI=flashly://auth-callback" >> .env.local

      - name: Fix Xcode env for CI
        run: |
          NODE_PATH=$(which node)
          echo "export NODE_BINARY=${NODE_PATH}" > ios/.xcode.env.local
          echo 'if [ -f "$SRCROOT/../.env.local" ]; then set -a; source "$SRCROOT/../.env.local"; set +a; fi' >> ios/.xcode.env.local
          echo "Node path: ${NODE_PATH}"

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS app (unsigned for AltStore)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/FlashcardsApp.xcworkspace \
            -scheme FlashcardsApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            COMPILER_INDEX_STORE_ENABLE=NO \
            FORCE_BUNDLING=1 \
            build 2>&1 | tee build.log | tail -100

      - name: Show build errors on failure
        if: failure()
        run: |
          echo "=== ERRORS ==="
          grep -A 5 "error:" build.log | tail -60
          echo ""
          echo "=== FAILED COMMANDS ==="
          grep -B 2 -A 5 "failed" build.log | tail -40

      - name: Package .app to .ipa
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/FlashcardsApp.app Payload/
          zip -r FlashcardsApp.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashcardsApp-ipa
          path: FlashcardsApp.ipa
          retention-days: 14
