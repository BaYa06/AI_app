name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install JS dependencies
        run: npm install

      - name: Fix Xcode env for CI
        run: |
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Fix minimum deployment target for Pods
        run: |
          cd ios
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 9\.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10\.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11\.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' Pods/Pods.xcodeproj/project.pbxproj

      - name: Build iOS app (unsigned for AltStore)
        run: |
          export FORCE_BUNDLING=1
          xcodebuild \
            -workspace ios/FlashcardsApp.xcworkspace \
            -scheme FlashcardsApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            build

      - name: Package .app to .ipa
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/FlashcardsApp.app Payload/
          zip -r FlashcardsApp.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashcardsApp-ipa
          path: FlashcardsApp.ipa
          retention-days: 14
